<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Udri's Launchpad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Suppress Tailwind Play CDN "production" warning for standalone HTML file -->
  <script>window.process = { env: { NODE_ENV: 'development' } };</script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .glass { 
      background: rgba(0, 0, 0, 0.78); 
      backdrop-filter: blur(20px); 
    }
    .gantt-bar {
      transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      position: relative;
    }
    .gantt-bar:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
    }
    .gantt-bar::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 50;
    }
    .gantt-bar:hover::after {
      opacity: 1;
    }

    .deadline-marker::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 50;
    }

    .deadline-marker:hover::after {
      opacity: 1;
    }

    /* Urgent / closest deadline marker - shinier and more attention-grabbing */
    .urgent-deadline {
      background: #f43f5e;
      box-shadow: 0 0 12px #f43f5e, 0 0 24px #f43f5e;
      animation: urgent-pulse 2s infinite ease-in-out;
    }

    @keyframes urgent-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .section-header { transition: color 0.2s ease; cursor: pointer; }
    .section-header:hover { color: #60a5fa; }
    .timeline-header {
      font-size: 0.75rem;
      color: #9ca3af;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen">
  <!-- Password Protection Overlay -->
  <div id="password-overlay" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[9999]">
    <div class="bg-gray-900 border border-gray-700 rounded-3xl p-10 w-full max-w-md text-center">
      <div class="flex justify-center mb-6">
        <div class="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center text-3xl">🚀</div>
      </div>
      <h1 class="text-3xl font-bold tracking-tighter mb-2">UDRI'S LAUNCHPAD</h1>
      <p class="text-gray-400 mb-8">WRC-27 & PleniPot 2026</p>

      <div class="space-y-4">
        <input id="password-input" 
               type="password" 
               placeholder="Enter password" 
               class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-blue-500">
        
        <button onclick="checkPassword()" 
                class="w-full bg-white text-black hover:bg-gray-200 py-4 rounded-2xl font-semibold text-lg">
          Access Dashboard
        </button>
      </div>

      <p id="password-error" class="text-red-400 text-sm mt-4 hidden">Incorrect password. Please try again.</p>
    </div>
  </div>

  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-80 bg-black/90 border-r border-gray-800 p-6 overflow-y-auto">
      <div class="flex items-center gap-3 mb-10">
        <div class="w-9 h-9 bg-red-600 rounded-full flex items-center justify-center text-white font-bold text-xl">🚀</div>
        <h1 class="text-3xl font-bold tracking-tighter">UDRI'S LAUNCHPAD</h1>
      </div>
      
      <div class="space-y-3 mb-10">
        <button onclick="showAddModal()" class="w-full bg-white text-black hover:bg-gray-200 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
          <i class="fas fa-plus"></i> NEW EVENT
        </button>
        <button onclick="exportData()" class="w-full bg-gray-900 hover:bg-gray-800 py-3 rounded-2xl text-sm flex items-center justify-center gap-2">
          <i class="fas fa-download"></i> Export Data
        </button>
        <button onclick="document.getElementById('import-input').click()" class="w-full bg-gray-900 hover:bg-gray-800 py-3 rounded-2xl text-sm flex items-center justify-center gap-2">
          <i class="fas fa-upload"></i> Import Data
        </button>
        <input type="file" id="import-input" class="hidden" accept=".json" onchange="importData(event)">
      </div>

      <div onclick="clearFilter()" class="text-lg font-semibold mb-4 text-gray-400 tracking-widest cursor-pointer hover:text-blue-400 flex items-center gap-2">
        <i class="fas fa-list-ul"></i> 
        <span>All events</span>
      </div>
      <div id="category-tree" class="space-y-6"></div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-auto relative">
      <div class="flex justify-between items-center mb-8">
        <div class="flex items-end gap-4">
          <div>
            <h2 class="text-5xl font-bold tracking-tighter" id="current-view">Mission Control</h2>
            <p class="text-gray-400">WRC-27 & PleniPot 2026</p>
          </div>

        </div>
        
        <button onclick="changeBackground()" 
                class="flex items-center gap-2 bg-gray-900 hover:bg-gray-800 px-5 py-3 rounded-2xl text-sm font-medium border border-gray-700">
          <i class="fas fa-image"></i> Change Background
        </button>
      </div>

      <!-- Main Content: Timeline (left) + Tasks (right) -->
      <!-- TIMELINE VIEW with Tasks Tab -->
      <div class="mb-8">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-4">
            <h3 class="text-2xl font-semibold flex items-center gap-3">
              <i class="fas fa-chart-bar text-blue-400"></i> 
              TIMELINE VIEW
            </h3>

            <!-- Tabs: Timeline / Tasks View -->
            <div class="flex bg-gray-800 rounded-2xl p-1 text-sm">
              <button onclick="switchToTimelineView()" id="tab-timeline"
                      class="px-5 py-1.5 rounded-2xl bg-white text-black font-medium">Timeline</button>
              <button onclick="switchToTasksView()" id="tab-tasks"
                      class="px-5 py-1.5 rounded-2xl hover:bg-gray-700">Tasks View</button>
            </div>
          </div>

          <!-- Hashtags -->
          <div class="flex gap-3 justify-end mb-2 pr-1" id="hashtags-container">
            <span id="hashtag1" 
                  class="px-4 py-0.5 text-xl font-bold tracking-[2.5px] text-white drop-shadow-[0_2px_8px_rgba(0,0,0,0.9)] cursor-pointer select-none transform skew-x-[-7deg] hover:scale-105 active:scale-95 transition-all duration-200"
                  contenteditable="true"
                  onblur="saveHashtags()"
                  onkeydown="if (event.key === 'Enter') { event.preventDefault(); this.blur(); }">#ReformITU</span>
            
            <span id="hashtag2" 
                  class="px-4 py-0.5 text-xl font-bold tracking-[2.5px] text-white drop-shadow-[0_2px_8px_rgba(0,0,0,0.9)] cursor-pointer select-none transform skew-x-[-7deg] hover:scale-105 active:scale-95 transition-all duration-200"
                  contenteditable="true"
                  onblur="saveHashtags()"
                  onkeydown="if (event.key === 'Enter') { event.preventDefault(); this.blur(); }">#ReformEPFD</span>
          </div>
          
          <!-- Time Range Filters -->
          <div class="flex bg-gray-900 rounded-2xl p-1 border border-gray-800" id="timeline-filters">
            <button onclick="setTimelineRange(14)" class="px-4 py-2 text-sm rounded-2xl hover:bg-gray-800 transition-all" id="btn-14">2 Weeks</button>
            <button onclick="setTimelineRange(30)" class="px-4 py-2 text-sm rounded-2xl hover:bg-gray-800 transition-all" id="btn-30">1 Month</button>
            <button onclick="setTimelineRange(90)" class="px-4 py-2 text-sm rounded-2xl hover:bg-gray-800 transition-all" id="btn-90">3 Months</button>
            <button onclick="setTimelineRange(180)" class="px-4 py-2 text-sm rounded-2xl hover:bg-gray-800 transition-all" id="btn-180">6 Months</button>
            <button onclick="setEndOfYear()" class="px-4 py-2 text-sm rounded-2xl hover:bg-gray-800 transition-all" id="btn-365">End of Year</button>
          </div>
        </div>

        <!-- Dynamic Content: Timeline or Tasks -->
        <div id="main-content-area">
          <!-- Timeline Content (default visible) -->
          <div id="timeline-content">
            <div class="bg-gray-900/70 glass rounded-3xl p-6 border border-gray-800">
              <div id="gantt-container" class="overflow-x-auto" style="max-width: 100%;">
                <!-- Gantt chart will be rendered here -->
              </div>
            </div>
          </div>

          <!-- Tasks View Content (hidden by default) -->
          <div id="tasks-content" class="hidden">
            <div class="bg-gray-900/70 glass rounded-3xl p-6 border border-gray-800">
              <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold flex items-center gap-2 text-lg">
                  <i class="fas fa-tasks text-emerald-400"></i> All Tasks
                </h3>
                <button onclick="renderTasksView()" class="text-xs px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-xl">Refresh</button>
              </div>
              <div id="tasks-list-content" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[65vh] overflow-y-auto pr-2">
                <!-- Tasks will be rendered here -->
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ACTIVE MISSIONS (Event Cards below Timeline) -->
      <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 mt-6">
        <div class="xl:col-span-12 bg-gray-900/70 glass rounded-3xl p-6 border border-gray-800">
          <h3 class="font-semibold mb-4 flex items-center gap-2">
            <i class="fas fa-list"></i> ACTIVE MISSIONS
          </h3>
          <div id="events-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- New Event Modal -->
  <div id="new-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-3xl p-8 w-full max-w-lg border border-gray-700">
      <h3 class="text-2xl font-bold mb-6">New Event</h3>
      <input id="event-title" type="text" placeholder="Event Title" class="w-full bg-gray-800 rounded-2xl px-5 py-4 mb-4">
      <textarea id="event-desc" placeholder="Description / Background" class="w-full bg-gray-800 rounded-2xl px-5 py-4 h-24 mb-6"></textarea>
      
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Start Date</label>
          <input id="start-date" type="date" class="w-full bg-gray-800 rounded-2xl px-5 py-4">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">End Date</label>
          <input id="end-date" type="date" class="w-full bg-gray-800 rounded-2xl px-5 py-4">
        </div>
      </div>

      <select id="macro-group" onchange="updateSubgroups()" class="w-full bg-gray-800 rounded-2xl px-5 py-4 mb-3">
        <option value="">Select Macro Group</option>
        <option value="WRC27">WRC27</option>
        <option value="PleniPot26">PleniPot 26</option>
      </select>
      <select id="sub-group" class="w-full bg-gray-800 rounded-2xl px-5 py-4 mb-6"></select>

      <input id="assignees" type="text" placeholder="Assignees (comma separated)" class="w-full bg-gray-800 rounded-2xl px-5 py-4 mb-6">

      <div class="flex justify-end gap-3">
        <button onclick="closeNewModal()" class="px-6 py-3 bg-gray-700 rounded-2xl">Cancel</button>
        <button onclick="saveNewEvent()" class="px-8 py-3 bg-white text-black rounded-2xl font-semibold">Create Event</button>
      </div>
    </div>
  </div>

  <!-- Detailed Event Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-3xl p-8 w-full max-w-2xl max-h-[90vh] overflow-auto border border-gray-700">
      <div class="flex justify-between items-start mb-6">
        <h3 class="text-2xl font-bold" id="detail-title"></h3>
        <div class="flex items-center gap-3">
          <button onclick="editCurrentEvent()" 
                  class="px-5 py-2 text-sm bg-gray-800 hover:bg-gray-700 rounded-2xl flex items-center gap-2">
            <i class="fas fa-edit"></i> Edit
          </button>
          <button onclick="deleteCurrentEvent()" 
                  class="px-5 py-2 text-sm bg-red-900/70 hover:bg-red-800 text-red-400 rounded-2xl flex items-center gap-2">
            <i class="fas fa-trash"></i> Delete
          </button>
          <button onclick="closeDetailModal()" class="text-gray-400 hover:text-white text-2xl">✕</button>
        </div>
      </div>

      <p id="detail-desc" class="text-gray-300 mb-6 whitespace-pre-wrap"></p>
      
      <div class="flex gap-6 text-sm mb-8" id="detail-date-range"></div>

      <div id="detail-macro" class="mb-8"></div>
      <div id="detail-assignees" class="mb-8"></div>

      <div class="mb-8">
        <h4 class="font-semibold mb-3 flex items-center gap-2"><i class="fas fa-tasks text-emerald-400"></i> Tasks</h4>
        <div id="tasks-list" class="space-y-2 mb-4"></div>
        <div class="flex gap-2">
          <input id="new-task" placeholder="New task..." class="flex-1 bg-gray-800 rounded-2xl px-4 py-3">
          <input id="new-task-owner" placeholder="Owner" value="Eric" class="w-32 bg-gray-800 rounded-2xl px-3 py-3 text-sm">
          <button onclick="addTask()" class="bg-emerald-600 px-6 rounded-2xl">Add</button>
        </div>
      </div>

      <div>
        <h4 class="font-semibold mb-3 flex items-center gap-2"><i class="fas fa-clock text-rose-400"></i> Deadlines</h4>
        <div id="deadlines-list" class="space-y-2 mb-4"></div>
        <div class="flex gap-2">
          <input id="new-deadline-title" placeholder="Deadline title" class="flex-1 bg-gray-800 rounded-2xl px-4 py-3">
          <input id="new-deadline-date" type="date" class="bg-gray-800 rounded-2xl px-4 py-3 w-40">
          <button onclick="addDeadline()" class="bg-rose-600 px-6 rounded-2xl">Add</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Safe localStorage wrapper (handles sandboxed iframes / restricted environments)
    let memoryStorage = {};
    function safeGetItem(key) {
      try { return localStorage.getItem(key); } catch(e) { return memoryStorage[key] || null; }
    }
    function safeSetItem(key, value) {
      try { localStorage.setItem(key, value); } catch(e) { memoryStorage[key] = value; }
    }

    let events = []; // Will be loaded from data.json or localStorage
    let currentEventId = null;
    let editingEventId = null;
    let currentTimelineDays = 30; // Default: 1 month
    let currentFilter = { type: null, value: null };
    let collapsedEvents = new Set(); // event ids whose deadlines are collapsed in the timeline
    let collapsedSidebarSections = new Set(); // e.g. "WRC27-ITU WPs"
    const colors = { "WRC27": "#3b82f6", "PleniPot26": "#a855f7" };

    const hierarchy = {
      "WRC27": {
        "ITU WPs": ["WP4A", "WP4C", "WP5C", "WP5D", "7B/7C/7D"],
        "Regional Preparation": {
          "CITEL": ["PCC.I", "PCC.II"],
          "CEPT": ["PTA", "PTB", "PTC", "PT1", "FM44", "SE 40"],
          "ATU": ["ECOWAS", "EACO", "SADC"],
          "ASMG": [],
          "RCC": [],
          "APT": ["APG", "AWG"],
          "WAC": []
        }
      },
      "PleniPot26": {
        "Regional Preparation": ["CITEL", "CEPT", "ATU", "ASMG", "RCC", "APT"]
      }
    };

    function saveToLocal() { safeSetItem('wrcEvents', JSON.stringify(events)); }

    function exportData() {
      const dataStr = JSON.stringify(events, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = "wrc-events.json"; a.click();
    }

    function importData(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          events = JSON.parse(ev.target.result);
          saveToLocal();
          renderAll();
          alert("✅ Data imported successfully!");
        } catch(err) { alert("Invalid file"); }
      };
      reader.readAsText(file);
    }

    function loadBackground() {
      const bg = safeGetItem('launchpadBackground');
      if (bg) document.body.style.backgroundImage = `url(${bg})`;
    }

    function changeBackground() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          safeSetItem('launchpadBackground', ev.target.result);
          document.body.style.backgroundImage = `url(${ev.target.result})`;
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    // ==================== GANTT CHART ====================
    function setTimelineRange(days) {
      currentTimelineDays = days;
      window.endOfYearMode = false;
      currentFilter = { type: null, value: null }; // reset category filter when changing time range
      
      // Update active button style
      document.querySelectorAll('[id^="btn-"]').forEach(btn => {
        btn.classList.remove('bg-white', 'text-black', 'font-semibold');
        btn.classList.add('hover:bg-gray-800');
      });
      const activeBtn = document.getElementById('btn-' + days);
      if (activeBtn) {
        activeBtn.classList.add('bg-white', 'text-black', 'font-semibold');
        activeBtn.classList.remove('hover:bg-gray-800');
      }
      
      renderGanttChart();
    }

    function setEndOfYear() {
      // Calculate exact days from today until 31 December 2026
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const endOfYear = new Date(2026, 11, 31); // 31 Dec 2026 (month is 0-indexed)
      endOfYear.setHours(23, 59, 59, 999);
      
      const diffTime = endOfYear - today;
      currentTimelineDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      // Special flag so renderGanttChart knows to hard-cap at 31 Dec 2026
      window.endOfYearMode = true;
      currentFilter = { type: null, value: null }; // reset category filter when changing time range
      
      // Update button styles
      document.querySelectorAll('[id^="btn-"]').forEach(btn => {
        btn.classList.remove('bg-white', 'text-black', 'font-semibold');
        btn.classList.add('hover:bg-gray-800');
      });
      const activeBtn = document.getElementById('btn-365');
      if (activeBtn) {
        activeBtn.classList.add('bg-white', 'text-black', 'font-semibold');
        activeBtn.classList.remove('hover:bg-gray-800');
      }
      
      renderGanttChart();
    }

    function renderGanttChart() {
      const container = document.getElementById('gantt-container');
      container.innerHTML = '';

      // Use local date construction to completely avoid timezone parsing issues
      function parseLocalDate(dateStr) {
        if (!dateStr) return null;
        const [y, m, d] = dateStr.split('-').map(Number);
        return new Date(y, m - 1, d, 12, 0, 0); // midday local time
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let endDate;
      if (window.endOfYearMode) {
        // Hard cap at 31 December 2026
        endDate = new Date(2026, 11, 31);
        endDate.setHours(23, 59, 59, 999);
      } else {
        endDate = new Date(today);
        endDate.setDate(endDate.getDate() + currentTimelineDays);
        endDate.setHours(23, 59, 59, 999);
      }

      // Apply the same sidebar filter to the Gantt timeline
      // (so clicking WP4A, ITU WPs, Regional Preparation, etc. filters the timeline too)
      const filteredEvents = getFilteredEvents();

      let deadlineLookupEnd = endDate;
      if (currentTimelineDays <= 90) {
        deadlineLookupEnd = new Date(today);
        deadlineLookupEnd.setDate(deadlineLookupEnd.getDate() + 180); // look up to 6 months ahead for deadlines
        deadlineLookupEnd.setHours(23, 59, 59, 999);
      }

      // Collect all items (events + deadlines)
      let allItems = [];

      filteredEvents.forEach(ev => {
        const eventStart = parseLocalDate(ev.startDate);
        const eventEnd = parseLocalDate(ev.endDate);
        if (!eventStart || !eventEnd) return;

        eventStart.setHours(0, 0, 0, 0);
        eventEnd.setHours(23, 59, 59, 999);

        // Use extended lookup window for short ranges
        const hasDeadlineInWindow = (ev.deadlines || []).some(dl => {
          const dlDate = parseLocalDate(dl.date);
          if (!dlDate) return false;
          return dlDate.getTime() >= today.getTime() && dlDate.getTime() <= deadlineLookupEnd.getTime();
        });

        const eventOverlapsWindow = (eventEnd >= today && eventStart <= endDate);

        if (eventOverlapsWindow) {
          // Normal case: event bar overlaps the window → show the event + its deadlines in the window
          allItems.push({
            type: 'event',
            id: ev.id,
            title: ev.title,
            start: eventStart,
            end: eventEnd,
            macro: ev.macro,
            color: colors[ev.macro] || '#64748b'
          });

          if (ev.deadlines && ev.deadlines.length > 0) {
            ev.deadlines.forEach(dl => {
              const dlDate = parseLocalDate(dl.date);
              if (!dlDate) return;
              if (dlDate.getTime() >= today.getTime() && dlDate.getTime() <= deadlineLookupEnd.getTime()) {
                allItems.push({
                  type: 'deadline',
                  parentId: ev.id,
                  parentTitle: ev.title,
                  title: dl.title,
                  date: dlDate,
                  color: '#f43f5e'
                });
              }
            });
          }
        } else if (hasDeadlineInWindow) {
          // Special case for short views: event is in the future, but has deadline(s) in current window.
          // Show the parent event name as a header row + only the relevant deadline(s).
          allItems.push({
            type: 'event-header',
            id: ev.id,
            title: ev.title,
            dateRange: `${ev.startDate} → ${ev.endDate}`,
            macro: ev.macro
          });

          if (ev.deadlines && ev.deadlines.length > 0) {
            ev.deadlines.forEach(dl => {
              const dlDate = parseLocalDate(dl.date);
              if (!dlDate) return;
              if (dlDate.getTime() >= today.getTime() && dlDate.getTime() <= deadlineLookupEnd.getTime()) {
                allItems.push({
                  type: 'deadline',
                  parentId: ev.id,
                  parentTitle: ev.title,
                  title: dl.title,
                  date: dlDate,
                  color: '#f43f5e'
                });
              }
            });
          }
        }
      });

      // Sort so that events with the closest upcoming deadlines appear first in the timeline
      const eventMinDeadline = new Map();
      allItems.forEach(item => {
        const eventId = item.id || item.parentId;
        if (item.type === 'deadline') {
          const current = eventMinDeadline.get(eventId);
          if (!current || item.date < current) {
            eventMinDeadline.set(eventId, item.date);
          }
        } else {
          if (!eventMinDeadline.has(eventId)) {
            eventMinDeadline.set(eventId, new Date(8640000000000000)); // far in future if no deadline in window
          }
        }
      });

      allItems.sort((a, b) => {
        const dateA = eventMinDeadline.get(a.id || a.parentId) || new Date(8640000000000000);
        const dateB = eventMinDeadline.get(b.id || b.parentId) || new Date(8640000000000000);
        return dateA.getTime() - dateB.getTime();
      });

      // Group items by event for collapse/expand support
      const eventGroups = new Map();
      allItems.forEach(item => {
        const eventId = item.id || item.parentId;
        if (!eventGroups.has(eventId)) {
          eventGroups.set(eventId, { eventItem: null, deadlineItems: [] });
        }
        const group = eventGroups.get(eventId);
        if (item.type === 'event' || item.type === 'event-header') {
          group.eventItem = item;
        } else if (item.type === 'deadline') {
          group.deadlineItems.push(item);
        }
      });

      if (allItems.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 text-gray-500">
            <i class="fas fa-rocket text-4xl mb-4"></i>
            <p>No events or deadlines in this time range.</p>
          </div>
        `;
        return;
      }

      // Fully responsive timeline: always uses 100% of the available container width
      // No slider on any screen size, external monitor, or resolution
      const dayWidthPercent = 100 / currentTimelineDays;

      // Header
      const header = document.createElement('div');
      header.className = 'flex mb-3 px-4';
      let headerHTML = `<div class="w-44 flex-shrink-0 font-medium text-sm text-gray-400">Mission / Deadline</div>`;
      headerHTML += `<div class="flex-1 relative h-6">`;
      
      // Daily labels for short ranges (2 weeks / 3 weeks), otherwise smart step
      const labelStep = currentTimelineDays <= 21 ? 1 : (currentTimelineDays > 120 ? 30 : (currentTimelineDays > 60 ? 14 : 7));
      for (let i = 0; i < currentTimelineDays; i += labelStep) {
        const d = new Date(today);
        d.setDate(d.getDate() + i);
        headerHTML += `<div class="absolute text-sm font-medium text-gray-300" style="left: ${i * dayWidthPercent}%; white-space: nowrap;">${d.toLocaleDateString('en-US', {month:'short', day:'numeric'})}</div>`;
      }
      headerHTML += `</div>`;
      header.innerHTML = headerHTML;
      container.appendChild(header);

      // Draw items with collapse support
      let urgentDeadlineRendered = false;

      eventGroups.forEach(group => {
        const { eventItem, deadlineItems } = group;
        if (!eventItem) return;

        const eventId = eventItem.id;
        const isCollapsed = collapsedEvents.has(eventId);
        const hasDeadlines = deadlineItems.length > 0;

        const row = document.createElement('div');
        row.className = 'flex items-center mb-2 px-3 group';

        if (isCollapsed && hasDeadlines) {
          // Collapsed view: one row with event + all deadline markers
          const eventTitle = eventItem.title;
          const dateRange = eventItem.dateRange || `${eventItem.start.toISOString().split('T')[0]} → ${eventItem.end.toISOString().split('T')[0]}`;

          let markersHTML = '';

          // Main event marker (blue circle or bar)
          if (eventItem.type === 'event') {
            const visibleStart = today;
            const visibleEnd = endDate;
            const barStart = eventItem.start > visibleStart ? eventItem.start : visibleStart;
            const barEnd = eventItem.end < visibleEnd ? eventItem.end : visibleEnd;
            const daysFromToday = Math.floor((barStart - today) / (1000 * 60 * 60 * 24));
            const duration = Math.max(1, Math.ceil((barEnd - barStart) / (1000 * 60 * 60 * 24)) + 1);
            const leftPercent = Math.max(0, daysFromToday * dayWidthPercent);
            const widthPercent = duration * dayWidthPercent;

            markersHTML += `
              <div class="gantt-bar absolute top-1 h-6 rounded-2xl flex items-center px-3 text-xs font-medium text-white shadow-md cursor-pointer"
                   style="left: ${leftPercent}%; width: ${widthPercent}%; background: linear-gradient(90deg, ${eventItem.color}, ${eventItem.color}dd);"
                   data-tooltip="${eventTitle} (${eventItem.start.toISOString().split('T')[0]} → ${eventItem.end.toISOString().split('T')[0]})">
                <span class="truncate">${eventTitle}</span>
              </div>
            `;
          } else {
            // event-header style
            markersHTML += `
              <div class="absolute top-1 h-6 flex items-center px-2 text-xs font-medium text-gray-300 cursor-pointer"
                   style="left: 0; width: 100%;">
                <span class="truncate">${eventTitle}</span>
              </div>
            `;
          }

          // Add all deadline markers on the same row
          deadlineItems.forEach((dlItem, index) => {
            const daysFromToday = Math.floor((dlItem.date - today) / (1000 * 60 * 60 * 24));
            const leftPercent = Math.max(0, daysFromToday * dayWidthPercent);
            const isUrgent = !urgentDeadlineRendered && index === 0;
            if (isUrgent) urgentDeadlineRendered = true;

            markersHTML += `
              <div class="deadline-marker ${isUrgent ? 'urgent-deadline' : ''} absolute top-0 h-8 w-1 bg-rose-500 rounded-full shadow-[0_0_8px_#f43f5e] cursor-pointer"
                   style="left: ${leftPercent}%; z-index: 10;"
                   data-tooltip="${dlItem.title} — ${dlItem.parentTitle} (${dlItem.date.toISOString().split('T')[0]})">
              </div>
            `;
          });

          row.innerHTML = `
            <div class="w-44 flex-shrink-0 pr-3 flex items-center gap-2">
              <i class="fas fa-chevron-down text-gray-400 cursor-pointer w-4 chevron-toggle"></i>
              <div>
                <div class="font-semibold text-sm truncate text-gray-300">${eventTitle}</div>
                <div class="text-[10px] text-gray-500">${dateRange}</div>
              </div>
            </div>
            <div class="flex-1 relative h-8">
              ${markersHTML}
            </div>
          `;
          row.onclick = () => openDetailModal(eventId);

          // Attach chevron listener properly
          const chevron = row.querySelector('.chevron-toggle');
          if (chevron) {
            chevron.onclick = (e) => {
              e.stopImmediatePropagation();
              toggleEventCollapse(eventId);
            };
          }

        } else {
          // Expanded / normal view
          if (eventItem.type === 'event-header') {
            row.innerHTML = `
              <div class="w-44 flex-shrink-0 pr-3 flex items-center gap-2">
                <i class="fas fa-chevron-right text-gray-400 cursor-pointer w-4 chevron-toggle"></i>
                <div>
                  <div class="font-semibold text-sm truncate text-gray-300">${eventItem.title}</div>
                  <div class="text-[10px] text-gray-500">${eventItem.dateRange}</div>
                </div>
              </div>
              <div class="flex-1 relative h-8">
                <!-- no bar, just header -->
              </div>
            `;
            row.onclick = () => openDetailModal(eventId);

            const chevron = row.querySelector('.chevron-toggle');
            if (chevron) {
              chevron.onclick = (e) => {
                e.stopImmediatePropagation();
                toggleEventCollapse(eventId);
              };
            }
          } else if (eventItem.type === 'event') {
            const visibleStart = today;
            const visibleEnd = endDate;
            const barStart = eventItem.start > visibleStart ? eventItem.start : visibleStart;
            const barEnd = eventItem.end < visibleEnd ? eventItem.end : visibleEnd;
            const daysFromToday = Math.floor((barStart - today) / (1000 * 60 * 60 * 24));
            const duration = Math.max(1, Math.ceil((barEnd - barStart) / (1000 * 60 * 60 * 24)) + 1);
            const leftPercent = Math.max(0, daysFromToday * dayWidthPercent);
            const widthPercent = duration * dayWidthPercent;

            row.innerHTML = `
              <div class="w-44 flex-shrink-0 pr-3 flex items-center gap-2">
                <i class="fas fa-chevron-right text-gray-400 cursor-pointer w-4 chevron-toggle"></i>
                <div>
                  <div class="font-medium text-sm truncate">${eventItem.title}</div>
                  <div class="text-[10px] text-gray-500">${eventItem.start.toISOString().split('T')[0]} → ${eventItem.end.toISOString().split('T')[0]}</div>
                </div>
              </div>
              <div class="flex-1 relative h-8">
                <div class="gantt-bar absolute top-1 h-6 rounded-2xl flex items-center px-3 text-xs font-medium text-white shadow-md cursor-pointer"
                     style="left: ${leftPercent}%; width: ${widthPercent}%; background: linear-gradient(90deg, ${eventItem.color}, ${eventItem.color}dd);"
                     data-tooltip="${eventItem.title} (${eventItem.start.toISOString().split('T')[0]} → ${eventItem.end.toISOString().split('T')[0]})">
                  <span class="truncate">${eventItem.title}</span>
                </div>
              </div>
            `;
            row.onclick = () => openDetailModal(eventId);

            const chevron = row.querySelector('.chevron-toggle');
            if (chevron) {
              chevron.onclick = (e) => {
                e.stopImmediatePropagation();
                toggleEventCollapse(eventId);
              };
            }
          }

          container.appendChild(row);

          // Render individual deadline rows (only if not collapsed)
          deadlineItems.forEach((dlItem, index) => {
            const dlRow = document.createElement('div');
            dlRow.className = 'flex items-center mb-2 px-3 group';

            const daysFromToday = Math.floor((dlItem.date - today) / (1000 * 60 * 60 * 24));
            const leftPercent = Math.max(0, daysFromToday * dayWidthPercent);
            const isUrgent = !urgentDeadlineRendered && index === 0;
            if (isUrgent) urgentDeadlineRendered = true;

            dlRow.innerHTML = `
              <div class="w-44 flex-shrink-0 pr-3 flex items-center gap-2 pl-6">
                <div class="text-rose-400">●</div>
                <div>
                  <div class="font-medium text-sm text-rose-400 truncate">${dlItem.title}</div>
                  <div class="text-[10px] text-gray-500">${dlItem.parentTitle}</div>
                </div>
              </div>
              <div class="flex-1 relative h-8">
                <div class="deadline-marker ${isUrgent ? 'urgent-deadline' : ''} absolute top-0 h-8 w-1 bg-rose-500 rounded-full shadow-[0_0_8px_#f43f5e] cursor-pointer"
                     style="left: ${leftPercent}%;"
                     data-tooltip="${dlItem.title} — ${dlItem.parentTitle} (${dlItem.date.toISOString().split('T')[0]})">
                </div>
              </div>
            `;
            dlRow.onclick = () => openDetailModal(dlItem.parentId);
            container.appendChild(dlRow);
          });

          return; // already appended inside
        }

        container.appendChild(row);
      });
    }

    // ==================== REST OF THE APP ====================
    function getAllSubsForSection(macro, sectionName) {
      const content = hierarchy[macro];
      if (!content || !content[sectionName]) return [];
      
      if (Array.isArray(content[sectionName])) {
        return content[sectionName];
      } else if (typeof content[sectionName] === 'object') {
        let allSubs = [];
        Object.keys(content[sectionName]).forEach(group => {
          const subs = content[sectionName][group];
          if (Array.isArray(subs)) {
            allSubs = allSubs.concat(subs);
          } else {
            allSubs.push(group);
          }
        });
        return allSubs;
      }
      return [];
    }

    function filterBySection(macro, sectionName) {
      currentFilter = { type: 'section', macro: macro, section: sectionName };
      document.getElementById('current-view').textContent = `${macro} > ${sectionName}`;
      renderEventsList();
    }

    function renderCategoryTree() {
      const container = document.getElementById('category-tree');
      container.innerHTML = '';

      Object.keys(hierarchy).forEach(macro => {
        const macroDiv = document.createElement('div');
        macroDiv.className = 'mb-6';
        macroDiv.innerHTML = `
          <div onclick="filterByMacro('${macro}')" class="font-semibold text-lg cursor-pointer hover:text-blue-400 flex items-center gap-2 mb-3">
            <i class="fas fa-folder text-blue-400"></i> ${macro}
          </div>
        `;

        const content = hierarchy[macro];
        Object.keys(content).forEach(section => {
          const sectionDiv = document.createElement('div');
          sectionDiv.className = 'ml-6 mb-4';

          if (Array.isArray(content[section])) {
            // Flat section (e.g. ITU WPs) - support collapse
            const sectionKey = `${macro}-${section}`;
            const isCollapsed = collapsedSidebarSections.has(sectionKey);

            const sectionHeader = document.createElement('div');
            sectionHeader.className = 'section-header text-sm text-gray-400 mb-2 font-medium cursor-pointer hover:text-blue-400 flex items-center gap-2';
            sectionHeader.innerHTML = `
              <i class="fas ${isCollapsed ? 'fa-chevron-right' : 'fa-chevron-down'} text-gray-400 w-4 chevron-toggle"></i>
              ${section}
            `;
            sectionHeader.onclick = (e) => {
              // If clicking chevron, toggle collapse; otherwise filter
              if (e.target.classList.contains('chevron-toggle')) {
                e.stopImmediatePropagation();
                toggleSidebarSection(sectionKey);
              } else {
                filterBySection(macro, section);
              }
            };
            sectionDiv.appendChild(sectionHeader);

            if (!isCollapsed) {
              const itemsDiv = document.createElement('div');
              itemsDiv.className = 'ml-4 grid grid-cols-2 gap-1';
              content[section].forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'text-sm py-1 px-3 hover:bg-gray-800 rounded-xl cursor-pointer';
                itemDiv.textContent = item;
                itemDiv.onclick = () => filterBySub(item);
                itemsDiv.appendChild(itemDiv);
              });
              sectionDiv.appendChild(itemsDiv);
            }
          } else {
            // Nested section (e.g. Regional Preparation) - support collapse
            const sectionKey = `${macro}-${section}`;
            const isCollapsed = collapsedSidebarSections.has(sectionKey);

            const sectionHeader = document.createElement('div');
            sectionHeader.className = 'section-header text-sm text-gray-400 mb-2 font-medium cursor-pointer hover:text-blue-400 flex items-center gap-2';
            sectionHeader.innerHTML = `
              <i class="fas ${isCollapsed ? 'fa-chevron-right' : 'fa-chevron-down'} text-gray-400 w-4 chevron-toggle"></i>
              ${section}
            `;
            sectionHeader.onclick = (e) => {
              if (e.target.classList.contains('chevron-toggle')) {
                e.stopImmediatePropagation();
                toggleSidebarSection(sectionKey);
              } else {
                filterBySection(macro, section);
              }
            };
            sectionDiv.appendChild(sectionHeader);

            if (!isCollapsed) {
              Object.keys(content[section]).forEach(group => {
                const subs = content[section][group];
                const hasChildren = subs && subs.length > 0;
                const groupKey = `${macro}-${section}-${group}`;
                const groupIsCollapsed = collapsedSidebarSections.has(groupKey);

                const groupDiv = document.createElement('div');
                groupDiv.className = 'ml-4 mb-3';

                if (hasChildren) {
                  // Collapsable group header (e.g. CITEL, CEPT, ATU)
                  groupDiv.innerHTML = `
                    <div class="flex items-center gap-2 cursor-pointer text-sm font-medium hover:text-blue-400" onclick="event.target.closest('.ml-4').querySelector('.chevron-toggle')?.click()">
                      <i class="fas ${groupIsCollapsed ? 'fa-chevron-right' : 'fa-chevron-down'} text-gray-400 w-4 chevron-toggle"></i>
                      <span onclick="filterBySub('${group}'); event.stopImmediatePropagation();">${group}</span>
                    </div>
                    <div class="ml-6 mt-1 space-y-0.5 ${groupIsCollapsed ? 'hidden' : ''}">
                      ${subs.map(sub => `
                        <div onclick="filterBySub('${sub}')" class="text-xs pl-3 py-1 hover:bg-gray-800 rounded-xl cursor-pointer">${sub}</div>
                      `).join('')}
                    </div>
                  `;

                  // Attach collapse toggle to chevron
                  setTimeout(() => {
                    const chevron = groupDiv.querySelector('.chevron-toggle');
                    if (chevron) {
                      chevron.onclick = (e) => {
                        e.stopImmediatePropagation();
                        toggleSidebarSection(groupKey);
                      };
                    }
                  }, 0);
                } else {
                  // Simple group without children
                  groupDiv.innerHTML = `
                    <div onclick="filterBySub('${group}')" class="cursor-pointer text-sm font-medium hover:text-blue-400">${group}</div>
                  `;
                }

                sectionDiv.appendChild(groupDiv);
              });
            }
          }
          macroDiv.appendChild(sectionDiv);
        });
        container.appendChild(macroDiv);
      });
    }

    function updateSubgroups() {
      const macro = document.getElementById('macro-group').value;
      const subSelect = document.getElementById('sub-group');
      subSelect.innerHTML = '<option value="">Select Sub-group / Working Party</option>';

      if (!macro || !hierarchy[macro]) return;

      const structure = hierarchy[macro];

      Object.keys(structure).forEach(sectionKey => {
        const sectionContent = structure[sectionKey];

        if (Array.isArray(sectionContent)) {
          // Flat list (e.g. PleniPot26 Regional Preparation or old ITU WPs style)
          const optgroup = document.createElement('optgroup');
          optgroup.label = sectionKey;
          sectionContent.forEach(item => {
            optgroup.appendChild(new Option(item, item));
          });
          subSelect.appendChild(optgroup);
        } else {
          // Nested structure (WRC27 Regional Preparation)
          const sectionGroup = document.createElement('optgroup');
          sectionGroup.label = sectionKey;

          Object.keys(sectionContent).forEach(group => {
            const subs = sectionContent[group];

            // Always add the parent group itself (e.g. "ATU")
            sectionGroup.appendChild(new Option(group, group));

            // Then add children if they exist (e.g. "ECOWAS", "EACO", "SADC")
            if (subs && subs.length > 0) {
              subs.forEach(sub => {
                sectionGroup.appendChild(new Option(`    ${sub}`, sub)); // indent for visual hierarchy
              });
            }
          });

          subSelect.appendChild(sectionGroup);
        }
      });
    }

      document.getElementById('event-desc').value = '';

    function closeNewModal() { 
      document.getElementById('new-modal').classList.add('hidden');
      editingEventId = null; // reset editing state
      // Reset button text
      const saveBtn = document.querySelector('#new-modal button[onclick="saveNewEvent()"]');
      if (saveBtn) saveBtn.textContent = 'Create Event';
    }

    function saveNewEvent() {
      const title = document.getElementById('event-title').value.trim();
      const startDate = document.getElementById('start-date').value;
      const endDate = document.getElementById('end-date').value;

      if (!title || !startDate || !endDate) {
        alert("Title, Start Date and End Date are required");
        return;
      }

      if (editingEventId) {
        // UPDATE existing event
        const ev = events.find(e => e.id === editingEventId);
        if (ev) {
          ev.title = title;
          ev.description = document.getElementById('event-desc').value.trim();
          ev.startDate = startDate;
          ev.endDate = endDate;
          ev.macro = document.getElementById('macro-group').value;
          ev.sub = document.getElementById('sub-group').value;
          ev.assignees = document.getElementById('assignees').value.split(',').map(s => s.trim()).filter(Boolean);
        }
        editingEventId = null;
      } else {
        // CREATE new event
        events.push({
          id: Date.now(),
          title,
          description: document.getElementById('event-desc').value.trim(),
          startDate,
          endDate,
          macro: document.getElementById('macro-group').value,
          sub: document.getElementById('sub-group').value,
          assignees: document.getElementById('assignees').value.split(',').map(s => s.trim()).filter(Boolean),
          tasks: [],
          deadlines: []
        });
      }

      saveToLocal();
      closeNewModal();
      renderAll();
    }

    function editCurrentEvent() {
      if (!currentEventId) return;

      const ev = events.find(e => e.id === currentEventId);
      if (!ev) return;

      // Close detail modal
      document.getElementById('detail-modal').classList.add('hidden');

      // Open new modal in edit mode
      editingEventId = currentEventId;

      document.getElementById('new-modal').classList.remove('hidden');

      // Fill form with existing values
      document.getElementById('event-title').value = ev.title || '';
      document.getElementById('event-desc').value = ev.description || '';
      document.getElementById('start-date').value = ev.startDate || '';
      document.getElementById('end-date').value = ev.endDate || '';
      document.getElementById('macro-group').value = ev.macro || '';
      document.getElementById('assignees').value = (ev.assignees || []).join(', ');

      // Populate sub-group dropdown
      updateSubgroups();
      document.getElementById('sub-group').value = ev.sub || '';

      // Change button text
      const saveBtn = document.querySelector('#new-modal button[onclick="saveNewEvent()"]');
      if (saveBtn) saveBtn.textContent = 'Save Changes';
    }

    function deleteCurrentEvent() {
      if (!currentEventId) return;

      if (!confirm("Are you sure you want to delete this event? This action cannot be undone.")) {
        return;
      }

      events = events.filter(e => e.id !== currentEventId);
      saveToLocal();
      document.getElementById('detail-modal').classList.add('hidden');
      renderAll();

    function getOwnerColor(owner) {
      if (!owner) return '#64748b';
      // Gentle, consistent colors
      const gentleColors = {
        'Eric': '#60a5fa',      // soft blue
        'Udri': '#a78bfa',      // soft purple
        'Madeleine': '#f472b6', // soft pink
        'Zahid': '#34d399',     // soft green
        'Rohit': '#fbbf24',     // soft amber
      };
      if (gentleColors[owner]) return gentleColors[owner];

      // Fallback gentle hash-based color
      let hash = 0;
      for (let i = 0; i < owner.length; i++) {
        hash = owner.charCodeAt(i) + ((hash << 5) - hash);
      }
      const hue = Math.abs(hash) % 360;
      return `hsl(${hue}, 55%, 65%)`;
    }

    function renderTasks() {
      const ev = events.find(e => e.id === currentEventId);
      const container = document.getElementById('tasks-list');
      container.innerHTML = ev.tasks.map((task, i) => {
        const ownerColor = task.owner ? getOwnerColor(task.owner) : '#64748b';
        return `
          <div class="flex items-center gap-3 bg-gray-800 rounded-2xl p-3">
            <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${i})">
            <span class="${task.done ? 'line-through text-gray-500' : ''} flex-1">${task.text}</span>
            
            ${task.owner 
              ? `<span onclick="event.stopImmediatePropagation(); editTaskOwner(${i})" 
                       class="cursor-pointer px-2.5 py-0.5 text-xs text-white rounded-full hover:opacity-80" 
                       style="background-color: ${ownerColor}">${task.owner}</span>` 
              : ''}
            
            <button onclick="event.stopImmediatePropagation(); editTaskOwner(${i})" 
                    class="text-gray-400 hover:text-white ml-1 text-xs">
              <i class="fas fa-edit"></i>
            </button>
          </div>
        `;
      }).join('');
    }

    function editTaskOwner(taskIndex) {
      const ev = events.find(e => e.id === currentEventId);
      if (!ev || !ev.tasks[taskIndex]) return;

      const currentOwner = ev.tasks[taskIndex].owner || "Eric";
      const newOwner = prompt("Change owner for this task:", currentOwner);
      
      if (newOwner !== null && newOwner.trim() !== "") {
        ev.tasks[taskIndex].owner = newOwner.trim();
        saveToLocal();
        renderTasks();           // refresh detail modal
        renderTasksView();       // refresh main Tasks View if open
      }
    }

    function renderDeadlines() {
      const ev = events.find(e => e.id === currentEventId);
      const container = document.getElementById('deadlines-list');
      container.innerHTML = ev.deadlines.map((dl, i) => `
        <div class="bg-gray-800/70 rounded-2xl p-4 flex justify-between items-center group">
          <div class="flex-1">
            <div><span class="text-rose-400">●</span> ${dl.title}</div>
            <div class="text-sm text-gray-400">${dl.date}</div>
          </div>
          
          <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="event.stopImmediatePropagation(); editDeadline(${i})" 
                    class="text-gray-400 hover:text-white px-2 py-1 text-sm">
              <i class="fas fa-edit"></i>
            </button>
            <button onclick="event.stopImmediatePropagation(); deleteDeadline(${i})" 
                    class="text-gray-400 hover:text-red-400 px-2 py-1 text-sm">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    function addTask() {
      const text = document.getElementById('new-task').value.trim();
      const owner = document.getElementById('new-task-owner').value.trim() || "Eric";
      if (!text) return;
      const ev = events.find(e => e.id === currentEventId);
      ev.tasks.push({ text, done: false, owner });
      saveToLocal();
      renderTasks();
      document.getElementById('new-task').value = '';
    }

    function toggleTask(i) {
      const ev = events.find(e => e.id === currentEventId);
      ev.tasks[i].done = !ev.tasks[i].done;
      saveToLocal();
      renderTasks();
    }

    function addDeadline() {
      const title = document.getElementById('new-deadline-title').value.trim();
      const date = document.getElementById('new-deadline-date').value;
      if (!title || !date) return;
      const ev = events.find(e => e.id === currentEventId);
      ev.deadlines.push({ title, date });
      saveToLocal();
      renderDeadlines();
      document.getElementById('new-deadline-title').value = '';
    }

    function editDeadline(index) {
      const ev = events.find(e => e.id === currentEventId);
      if (!ev || !ev.deadlines[index]) return;

      const current = ev.deadlines[index];

      const newTitle = prompt("Edit deadline title:", current.title);
      if (newTitle === null) return; // user cancelled

      const newDate = prompt("Edit deadline date (YYYY-MM-DD):", current.date);
      if (newDate === null) return;

      ev.deadlines[index] = {
        title: newTitle.trim() || current.title,
        date: newDate.trim() || current.date
      };

      saveToLocal();
      renderDeadlines();
    }

    function deleteDeadline(index) {
      if (!confirm("Delete this deadline?")) return;

      const ev = events.find(e => e.id === currentEventId);
      if (!ev) return;

      ev.deadlines.splice(index, 1);
      saveToLocal();
      renderDeadlines();
    }

    function closeDetailModal() {
      document.getElementById('detail-modal').classList.add('hidden');
      renderAll();
    }

    // Reusable function to get filtered events based on sidebar selection
    function getFilteredEvents() {
      let filtered = events;

      if (currentFilter.type === 'macro') {
        filtered = events.filter(ev => ev.macro === currentFilter.value);
      } else if (currentFilter.type === 'sub') {
        const subValue = currentFilter.value;
        let allowedSubs = [subValue];
        if (subValue === '7B/7C/7D') allowedSubs = ['WP7B', 'WP7C', 'WP7D', '7B/7C/7D'];
        if (['CITEL','CEPT','ATU','APT'].includes(subValue)) {
          const parentGroup = Object.values(hierarchy).find(m => m["Regional Preparation"] && m["Regional Preparation"][subValue]);
          if (parentGroup) {
            allowedSubs = [subValue, ...(parentGroup["Regional Preparation"][subValue] || [])];
          }
        }
        filtered = events.filter(ev => allowedSubs.includes(ev.sub));
      } else if (currentFilter.type === 'section') {
        const subsInSection = getAllSubsForSection(currentFilter.macro, currentFilter.section);
        filtered = events.filter(ev => 
          ev.macro === currentFilter.macro && subsInSection.includes(ev.sub)
        );
      }

      return filtered;
    }

    function switchToTimelineView() {
      document.getElementById('timeline-content').classList.remove('hidden');
      document.getElementById('tasks-content').classList.add('hidden');

      // Highlight active tab
      document.getElementById('tab-timeline').classList.add('bg-white', 'text-black', 'font-medium');
      document.getElementById('tab-tasks').classList.remove('bg-white', 'text-black', 'font-medium');

      // Show filters again
      document.getElementById('timeline-filters').classList.remove('hidden');
    }

    function switchToTasksView() {
      document.getElementById('timeline-content').classList.add('hidden');
      document.getElementById('tasks-content').classList.remove('hidden');

      // Highlight active tab
      document.getElementById('tab-timeline').classList.remove('bg-white', 'text-black', 'font-medium');
      document.getElementById('tab-tasks').classList.add('bg-white', 'text-black', 'font-medium');

      // Hide time filters when in Tasks view
      document.getElementById('timeline-filters').classList.add('hidden');

      renderTasksView();
    }

    function renderEventsList() {
      const container = document.getElementById('events-list');
      if (!container) return;

      const filtered = getFilteredEvents();

      if (filtered.length === 0) {
        container.innerHTML = `<p class="text-gray-500 col-span-2 py-8 text-center">No events match the current filter.</p>`;
        return;
      }

      container.innerHTML = filtered.map(ev => `
        <div onclick="openDetailModal(${ev.id})" class="cursor-pointer bg-gray-800/70 hover:bg-gray-700/70 rounded-3xl p-6 border-l-4 transition-all" style="border-color: ${colors[ev.macro] || '#64748b'}">
          <div class="flex justify-between">
            <span class="tag" style="background: ${colors[ev.macro] || '#64748b'}20; color: ${colors[ev.macro] || '#64748b'}">${ev.macro}</span>
            <span class="text-xs text-gray-400">${ev.startDate} → ${ev.endDate}</span>
          </div>
          <p class="font-semibold text-lg mt-3">${ev.title}</p>
        </div>
      `).join('');
    }

    let currentTaskOwnerFilter = null; // null = show all owners

    function renderTasksView() {
      const container = document.getElementById('tasks-list-content');
      if (!container) return;

      // Collect ALL tasks first (unfiltered)
      let allTasks = [];
      events.forEach(ev => {
        if (ev.tasks && ev.tasks.length > 0) {
          ev.tasks.forEach((task, index) => {
            allTasks.push({
              ...task,
              parentEventId: ev.id,
              parentEventTitle: ev.title,
              parentMacro: ev.macro,
              taskIndex: index
            });
          });
        }
      });

      // Build unique owners from the FULL list (so chips are always available)
      const uniqueOwners = [...new Set(allTasks.map(t => t.owner).filter(Boolean))];

      // Apply filter AFTER collecting unique owners
      let filteredTasks = allTasks;
      if (currentTaskOwnerFilter) {
        filteredTasks = allTasks.filter(t => t.owner === currentTaskOwnerFilter);
      }

      if (filteredTasks.length === 0) {
        container.innerHTML = `
          <div class="col-span-2 py-8 text-center text-gray-500">
            <i class="fas fa-tasks text-3xl mb-3 block"></i>
            <p class="text-sm">No tasks found${currentTaskOwnerFilter ? ` for ${currentTaskOwnerFilter}` : ''}.</p>
          </div>
        `;
        return;
      }

      let html = '';

      // Always show filter chips if there is at least one owner
      if (uniqueOwners.length > 0) {
        html += `<div class="flex flex-wrap gap-2 mb-4">`;
        
        // "All" chip
        html += `<span onclick="filterTasksByOwner(null)" 
                      class="cursor-pointer px-3 py-1 text-xs rounded-full transition-colors ${!currentTaskOwnerFilter ? 'bg-white text-black font-medium' : 'bg-gray-700 hover:bg-gray-600'}">All</span>`;
        
        uniqueOwners.forEach(owner => {
          const color = getOwnerColor(owner);
          const isActive = currentTaskOwnerFilter === owner;
          html += `<span onclick="filterTasksByOwner('${owner}')" 
                        class="cursor-pointer px-3 py-1 text-xs text-white rounded-full transition-all" 
                        style="background-color: ${isActive ? color : '#374151'}">${owner}</span>`;
        });
        html += `</div>`;
      }

      html += filteredTasks.map(task => {
        const ownerColor = task.owner ? getOwnerColor(task.owner) : '#64748b';
        return `
          <div onclick="openDetailModal(${task.parentEventId})" 
               class="cursor-pointer bg-gray-800/70 hover:bg-gray-700/70 rounded-2xl p-4 border-l-4 transition-all text-sm"
               style="border-color: ${colors[task.parentMacro] || '#64748b'}">
            <div class="flex items-start gap-3">
              <input type="checkbox" ${task.done ? 'checked' : ''} 
                     onchange="event.stopImmediatePropagation(); toggleTaskFromView(${task.parentEventId}, ${task.taskIndex}, this)"
                     class="mt-0.5">
              <div class="flex-1 min-w-0">
                <div class="font-medium leading-tight ${task.done ? 'line-through text-gray-500' : ''}">
                  ${task.text}
                </div>
                <div class="flex items-center gap-2 mt-1.5">
                  <div class="text-[10px] text-gray-400 truncate">
                    ${task.parentEventTitle}
                  </div>
                  ${task.owner ? `<span class="px-2 py-0.5 text-[10px] text-white rounded-full" style="background-color: ${ownerColor}">${task.owner}</span>` : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = html;
    }

    function filterTasksByOwner(owner) {
      currentTaskOwnerFilter = (currentTaskOwnerFilter === owner) ? null : owner;
      renderTasksView();
    }

    // Allow toggling task status directly from the Tasks view
    function toggleTaskFromView(eventId, taskIndex, checkbox) {
      event.stopImmediatePropagation();

      const ev = events.find(e => e.id === eventId);
      if (!ev || !ev.tasks[taskIndex]) return;

      ev.tasks[taskIndex].done = checkbox.checked;
      saveToLocal();

      // Refresh the tasks view
      if (currentMissionView === 'tasks') {
        renderTasksView();
      }
    }

    function renderAll() {
      renderCategoryTree();
      renderGanttChart();
      renderEventsList();
    }

    function filterByMacro(macro) {
      currentFilter = { type: 'macro', value: macro };
      document.getElementById('current-view').textContent = macro;
      renderAll();
    }

    function filterBySub(sub) {
      currentFilter = { type: 'sub', value: sub };
      document.getElementById('current-view').textContent = sub;
      renderAll();
    }

    function clearFilter() {
      currentFilter = { type: null, value: null };
      window.endOfYearMode = false;
      
      // Reset all timeline button styles
      document.querySelectorAll('[id^="btn-"]').forEach(btn => {
        btn.classList.remove('bg-white', 'text-black', 'font-semibold');
        btn.classList.add('hover:bg-gray-800');
      });
      
      document.getElementById('current-view').textContent = 'Mission Control';
      renderAll();
    }

    function toggleEventCollapse(eventId) {
      if (collapsedEvents.has(eventId)) {
        collapsedEvents.delete(eventId);
      } else {
        collapsedEvents.add(eventId);
      }
      renderGanttChart();
    }

    function toggleSidebarSection(key) {
      if (collapsedSidebarSections.has(key)) {
        collapsedSidebarSections.delete(key);
      } else {
        collapsedSidebarSections.add(key);
      }
      renderCategoryTree();
    }

    function loadHashtags() {
      const h1 = safeGetItem('hashtag1') || '#ReformITU';
      const h2 = safeGetItem('hashtag2') || '#ReformEPFD';
      const el1 = document.getElementById('hashtag1');
      const el2 = document.getElementById('hashtag2');
      if (el1) el1.textContent = h1;
      if (el2) el2.textContent = h2;
    }

    function saveHashtags() {
      const el1 = document.getElementById('hashtag1');
      const el2 = document.getElementById('hashtag2');
      if (el1) safeSetItem('hashtag1', el1.textContent.trim());
      if (el2) safeSetItem('hashtag2', el2.textContent.trim());
    }

    // Load events from data.json (for shared read-only version) or fallback to localStorage
    async function loadData() {
      try {
        // Try to load from data.json (preferred for shared GitHub Pages version)
        const response = await fetch('data.json');
        if (response.ok) {
          const data = await response.json();
          if (data.events && Array.isArray(data.events)) {
            events = data.events;
            console.log('Loaded events from data.json');
            return;
          }
        }
      } catch (e) {
        // Fetch failed (e.g. opening file directly) → fallback to localStorage
      }

      // Fallback to localStorage (useful for local testing / management)
      events = JSON.parse(safeGetItem('wrcEvents') || '[]');
      console.log('Loaded events from localStorage (fallback)');
    }

    // ==================== PASSWORD PROTECTION ====================
    const CORRECT_PASSWORD = "WRC27-2026"; // Change this if needed

    function checkPassword() {
      const input = document.getElementById('password-input').value.trim();
      const errorEl = document.getElementById('password-error');

      if (input === CORRECT_PASSWORD) {
        sessionStorage.setItem('authenticated', 'true');
        document.getElementById('password-overlay').style.display = 'none';
      } else {
        errorEl.classList.remove('hidden');
        document.getElementById('password-input').value = '';
        setTimeout(() => errorEl.classList.add('hidden'), 2000);
      }
    }

    function checkAuthentication() {
      if (sessionStorage.getItem('authenticated') === 'true') {
        const overlay = document.getElementById('password-overlay');
        if (overlay) overlay.style.display = 'none';
      }
    }

    async function init() {
      checkAuthentication(); // Check if already logged in this session

      await loadData();

      // TEMP: Assign "Eric" as owner to all tasks that don't have one yet
      events.forEach(ev => {
        if (ev.tasks && Array.isArray(ev.tasks)) {
          ev.tasks.forEach(task => {
            if (!task.owner) task.owner = "Eric";
          });
        }
      });
      saveToLocal();

      loadBackground();
      loadHashtags();
      renderAll();
      renderTasksView();
      
      // Set default active button (1 month)
      const defaultBtn = document.getElementById('btn-30');
      if (defaultBtn) {
        defaultBtn.classList.add('bg-white', 'text-black', 'font-semibold');
      }

      // Set default active tab to Timeline
      const timelineTab = document.getElementById('tab-timeline');
      if (timelineTab) {
        timelineTab.classList.add('bg-white', 'text-black', 'font-medium');
      }
    }

    init();
  </script>
</body>
</html>
